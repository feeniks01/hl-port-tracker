<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hyperliquid Tracker — Dark Lounge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* iPhone 17 Pro: 402×874 logical viewport (1:1) */
      --phone-width: 402px;
      --phone-height: 874px;
      --phone-bezel: 6px;
      --phone-radius: 38px;
      --dynamic-island-w: 126px;
      --dynamic-island-h: 37px;
      --safe-top: 54px;
      --safe-bottom: 34px;

      --bg: #050505;
      --gold-light: #f6d48b;
      --gold-mid: #d4a64a;
      --gold-dark: #a8741a;
      --positive: #D4A84F;
      --negative: #E06A6A;
      --text: #f4f4f5;
      --text-secondary: #71717a;
      --text-muted: #52525b;
      --radius: 8px;
      --font-display: "Instrument Serif", "DM Serif Display", Georgia, serif;
      --font-sans: "Inter", "Plus Jakarta Sans", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fff;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* iPhone 17 Pro frame: 1:1 realistic device (402×874 viewport) */
    .phone-wrap {
      --frame-w: calc(var(--phone-width) + var(--phone-bezel) * 2);
      --frame-h: calc(var(--phone-height) + var(--phone-bezel) * 2);
      width: var(--frame-w);
      height: var(--frame-h);
      flex-shrink: 0;
      transform-origin: center center;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15)) drop-shadow(0 24px 48px rgba(0,0,0,0.25)) drop-shadow(0 48px 96px rgba(0,0,0,0.15));
    }

    .phone-frame {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #252528 0%, #141416 35%, #0e0e10 70%, #1a1a1d 100%);
      border-radius: 52px;
      padding: var(--phone-bezel);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.07),
        0 0 0 1px rgba(0,0,0,0.4) inset;
      position: relative;
      overflow: visible;
    }
    .phone-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 52px;
      padding: 1px;
      background: linear-gradient(165deg, rgba(255,255,255,0.12) 0%, transparent 25%, transparent 60%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }
    @supports ((-webkit-mask-composite: xor) or (mask-composite: exclude)) {
      .phone-frame::before {
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
      }
    }

    /* Side buttons (left: action + volume; right: power) */
    .phone-btn {
      position: absolute;
      background: linear-gradient(90deg, #0a0a0b 0%, #1a1a1c 100%);
      border-radius: 2px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 0 0 1px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    .phone-btn-left { left: -2px; width: 3px; }
    .phone-btn-action { top: 22%; height: 28px; }
    .phone-btn-vol-up { top: 28%; height: 36px; }
    .phone-btn-vol-down { top: 36%; height: 36px; }
    .phone-btn-right { right: -2px; width: 3px; }
    .phone-btn-power { top: 22%; height: 64px; }

    .phone-screen {
      width: var(--phone-width);
      height: var(--phone-height);
      border-radius: var(--phone-radius);
      background:
        radial-gradient(circle at 20% 0%, rgba(212,166,74,0.12), transparent 40%),
        radial-gradient(circle at 80% 100%, rgba(255,190,80,0.06), transparent 40%),
        var(--bg);
      overflow: hidden;
      position: relative;
      margin: 0 auto;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.7) inset,
        0 1px 0 rgba(255,255,255,0.04) inset;
    }
    /* Glass reflection: subtle so content stays readable */
    .phone-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--phone-radius);
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 30%, transparent 60%, rgba(255,255,255,0.02) 100%);
      pointer-events: none;
      z-index: 2;
    }
    .phone-screen::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      border-radius: var(--phone-radius) var(--phone-radius) 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
    }

    /* Dynamic Island — recessed pill */
    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: var(--dynamic-island-w);
      height: var(--dynamic-island-h);
      background: radial-gradient(ellipse 80% 50% at 50% 0%, #1a1a1a, #000 60%);
      border-radius: 999px;
      z-index: 10;
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.5),
        inset 0 -1px 0 rgba(255,255,255,0.03),
        0 0 0 1px rgba(0,0,0,0.5);
    }

    /* Home indicator bar */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 5px;
      background: rgba(255,255,255,0.35);
      border-radius: 999px;
      z-index: 10;
      pointer-events: none;
    }

    .screen-inner {
      position: relative;
      z-index: 6;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: var(--safe-top) 0 var(--safe-bottom);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 1.5rem 1.5rem 2rem;
    }

    /* Header */
    header {
      margin-bottom: 2rem;
    }
    .logo {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    /* Section spacing (Rio: vertical rhythm) */
    .section-hero { margin-bottom: 3rem; }
    .section-block { margin-bottom: 2rem; }

    /* Hero — metallic number; typography scale 64–72px */
    .hero-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
      font-family: var(--font-sans);
    }
    .hero-sub {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
      font-family: var(--font-sans);
    }
    .hero-value-wrap {
      position: relative;
      display: inline-block;
    }
    .hero-value {
      display: inline-block;
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 14vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--gold-mid);
      background:
        linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%),
        linear-gradient(180deg, var(--gold-light) 0%, var(--gold-mid) 40%, var(--gold-dark) 100%);
      background-size: 200% 100%, 100% 100%;
      background-position: 200% 0, 0 0;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: hero-glow-pulse 5s ease-in-out infinite, metallic-sweep 7s ease-in-out infinite;
    }
    @supports not (background-clip: text) {
      .hero-value { color: var(--gold-mid); background: none; }
    }
    .hero-signature {
      width: 100%;
      max-width: 8rem;
      height: 1px;
      margin-top: 1.5rem;
      background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
      box-shadow: 0 0 10px rgba(212,166,74,0.25);
    }
    @keyframes hero-glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(212,166,74,0.2)); }
      50% { filter: drop-shadow(0 0 20px rgba(212,166,74,0.35)); }
    }
    @keyframes metallic-sweep {
      0%, 100% { background-position: 200% 0, 0 0; }
      50% { background-position: -100% 0, 0 0; }
    }

    /* Surfaces — no borders, spacing only (Rio: remove lines) */
    .card {
      background: none;
      border: none;
      border-radius: 0;
      padding: 0;
      margin-bottom: 0;
    }
    .card.parallax-surface {
      will-change: transform;
    }

    /* Section heading — stronger for skimming (Rio) */
    .section-heading {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      font-family: var(--font-sans);
    }

    /* Markets — row spacing 28–32px (Rio: breathing room) */
    .market-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 0;
      font-variant-numeric: tabular-nums;
    }
    .market-symbol {
      font-weight: 600;
      color: var(--text);
    }
    .market-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .market-price {
      color: var(--text);
      font-weight: 500;
      font-size: 1.125rem;
    }
    .market-change {
      font-size: 0.875rem;
      font-weight: 500;
      min-width: 3.5rem;
      text-align: right;
    }
    .market-change.positive { color: var(--positive); }
    .market-change.negative { color: var(--negative); }

    /* Wallet — heading, address, then CTA block, then stats (Rio) */
    .wallet-address-line {
      font-size: 0.875rem;
      color: var(--text);
      font-family: var(--font-sans);
      font-variant-numeric: tabular-nums;
      margin-bottom: 1rem;
    }
    .wallet-cta-wrap {
      margin-bottom: 1.25rem;
    }
    .btn-cta {
      display: block;
      width: 100%;
      background: var(--gold-mid);
      color: #0a0a0b;
      border: none;
      padding: 0.875rem 1.5rem;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    .btn-cta:hover {
      background: var(--gold-light);
      box-shadow: 0 0 20px rgba(212,166,74,0.3);
    }
    .wallet-stats {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .wallet-stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.8125rem;
      font-variant-numeric: tabular-nums;
    }
    .wallet-stat label { color: var(--text-muted); font-weight: 500; }
    .wallet-stat span { color: var(--text); font-weight: 600; }

    /* Positions — 16px, tabular alignment, no borders (Rio: scan hierarchy) */
    .position-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .position-item {
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }
    .position-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.25rem;
    }
    .position-name { font-weight: 600; color: var(--text); }
    .position-pnl { font-weight: 600; }
    .position-pnl.positive { color: var(--gold-mid); }
    .position-pnl.negative { color: var(--negative); }
    .position-detail {
      display: flex;
      justify-content: space-between;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
    .position-detail span { font-variant-numeric: tabular-nums; }


    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

      <div class="phone-btn phone-btn-left phone-btn-vol-down" aria-hidden="true"></div>

      <div class="phone-screen">

  </div>
  <script>
    (function() {
      "use strict";
      if (window.location.protocol === "file:") {
        var banner = document.createElement("div");
        banner.style.cssText = "position:fixed;bottom:12px;left:50%;transform:translateX(-50%);max-width:90%;background:rgba(0,0,0,0.85);color:#fff;padding:8px 14px;font-family:system-ui,sans-serif;font-size:12px;z-index:9999;text-align:center;border-radius:8px;";
        banner.textContent = "For best results run: python3 -m http.server 8765 then open http://localhost:8765/mockup/index.html";
        document.body.appendChild(banner);
      }
      try {
        var inner = document.querySelector(".screen-inner");
        var parallax = document.querySelector(".parallax-surface");
        if (inner && parallax) {
          inner.addEventListener("scroll", function() {
            parallax.style.transform = "translate3d(0, " + (inner.scrollTop * 0.05) + "px, 0)";
          });
        }
      } catch (e) {}
      var played = false;
      function subtleTone() {
        if (played) return;
        played = true;
        try {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return;
          var ctx = new Ctx();
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          osc.type = "sine";
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.12);
        } catch (e) {}
      }
      if (document.body) {
        document.body.addEventListener("click", subtleTone, { once: true });
        document.body.addEventListener("touchstart", subtleTone, { once: true, passive: true });
      }
    })();
  </script>

</html>
